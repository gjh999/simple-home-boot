<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>오류 발생</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/bootstrap-icons.min.css}">
    </head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh;">
<div class="text-center p-4">
    <i class="bi bi-exclamation-triangle-fill text-warning display-1"></i>
    <h1 class="mt-3" th:text="${status} ?: '오류'">오류</h1>
    <p class="text-muted" th:text="${message} ?: '요청을 처리하는 중 오류가 발생했습니다.'">오류 메시지</p>
    <a th:href="@{/}" class="btn btn-primary mt-2">
        <i class="bi bi-house me-1"></i>홈으로
    </a>
</div>
</body>
</html>
