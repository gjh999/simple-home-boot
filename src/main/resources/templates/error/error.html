<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{error.title}">오류 발생</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/krds/resources/cdn/krds.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/krds-compat.css}"/>
    <link rel="stylesheet" th:href="@{/css/krds.css}"/>
    </head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh;">
<div class="text-center p-4">
    <i class="bi bi-exclamation-triangle-fill text-warning display-1"></i>
    <h1 class="mt-3" th:text="${status} ?: #{error.heading}">오류</h1>
    <p class="text-muted" th:text="${message} ?: #{error.message}">오류 메시지</p>
    <a th:href="@{/}" class="btn btn-primary mt-2">
        <i class="bi bi-house me-1"></i><span th:text="#{error.home}">홈으로</span>
    </a>
</div>
</body>
</html>
