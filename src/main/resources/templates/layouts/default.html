<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <title layout:title-pattern="$CONTENT_TITLE - 전자정부표준프레임워크">전자정부표준프레임워크</title>

    <!--
        KRDS (Korea Design System · 디지털정부 표준 디자인 시스템, 행정안전부)
        https://www.krds.go.kr  |  로컬 자원만 사용(CDN 미사용 정책)
        Bootstrap 5 는 레이아웃/그리드 기반으로만 사용하고, 시각 디자인은 krds.css 가
        최종 권위로 덮어쓴다(반드시 마지막 로드). 기존 다크 theme.css 는 KRDS 밝은
        정부 표준 톤과 상충하므로 미사용(파일은 보존).
    -->
    <!-- Pretendard GOV 폰트 프리로드 (FOUT/글꼴 교체 깜빡임 최소화) -->
    <link rel="preload" th:href="@{/krds/resources/fonts/PretendardGOV-Regular.subset.woff2}" as="font" type="font/woff2" crossorigin/>
    <link rel="preload" th:href="@{/krds/resources/fonts/PretendardGOV-Medium.subset.woff2}" as="font" type="font/woff2" crossorigin/>
    <link rel="preload" th:href="@{/krds/resources/fonts/PretendardGOV-Bold.subset.woff2}" as="font" type="font/woff2" crossorigin/>
    <!-- Bootstrap Icons (아이콘 폰트 — 프레임워크 아님, 유지) -->
    <link rel="stylesheet" th:href="@{/css/bootstrap-icons.min.css}">
    <!-- 공식 KRDS 디자인 시스템 (HTML Component Kit, /krds) -->
    <link rel="stylesheet" th:href="@{/krds/resources/cdn/krds.min.css}"/>
    <!-- 공통 CSS -->
    <link rel="stylesheet" th:href="@{/css/common.css}"/>
    <!-- KRDS 호환 레이어(그리드/유틸/컴포넌트 구조·Pretendard GOV) + 스킨 (최종 권위) -->
    <link rel="stylesheet" th:href="@{/css/krds-compat.css}"/>
    <link rel="stylesheet" th:href="@{/css/krds.css}"/>
    <link rel="icon" type="image/svg+xml" th:href="@{/images/logo.svg}"/>

    <!-- 페이지별 추가 CSS -->
    <th:block layout:fragment="head-css"></th:block>
</head>
<body class="egov-body">

<!-- 접근성: 본문 바로가기 -->
<a href="#content" class="skip-nav" th:text="#{com.skipNav}">본문 바로가기</a>

<!-- 헤더 -->
<header class="egov-header" th:replace="~{fragments/header :: header}"></header>

<!-- 네비게이션 -->
<nav class="egov-nav" th:replace="~{fragments/nav :: nav}"></nav>

<!-- 본문 -->
<main id="content" class="egov-content container-fluid py-4">
    <th:block layout:fragment="content">
        <!-- 페이지별 콘텐츠가 여기에 삽입됩니다 -->
    </th:block>
</main>

<!-- 푸터 -->
<footer class="egov-footer" th:replace="~{fragments/footer :: footer}"></footer>

<!-- 공식 KRDS JS (탭·아코디언 등 KRDS 네이티브 컴포넌트 동작) -->
<script th:src="@{/krds/resources/cdn/krds.min.js}"></script>
<!-- KRDS 호환 JS(data-bs-* 동작 대체: 드롭다운·모바일메뉴·알림닫기) -->
<script th:src="@{/js/krds-compat.js}"></script>
<!-- KRDS JS (접근성 보조) -->
<script th:src="@{/js/krds.js}"></script>
<!-- 공통 JS -->
<script th:src="@{/js/common.js}"></script>

<!-- 페이지별 추가 JS -->
<th:block layout:fragment="body-js"></th:block>

<!-- 맨 위로 버튼 -->
<button type="button" id="scrollTopBtn" class="scroll-top-btn" th:attr="aria-label=#{com.scrollTop},title=#{com.scrollTop}" aria-label="맨 위로" title="맨 위로">
    <i class="bi bi-arrow-up"></i>
</button>
<script th:inline="none">
(function(){
    var btn = document.getElementById('scrollTopBtn');
    if(!btn) return;
    var onScroll = function(){ if(window.scrollY > 300){ btn.classList.add('show'); } else { btn.classList.remove('show'); } };
    window.addEventListener('scroll', onScroll, { passive:true }); onScroll();
    btn.addEventListener('click', function(){ window.scrollTo({ top:0, behavior:'smooth' }); });
})();
</script>
</body>
</html>
