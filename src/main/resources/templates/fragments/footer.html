<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<body>
<!-- 공용 리치 푸터(pub-foot): 로그인 전(public)·로그인 후(default) 동일 통일.
     스타일은 css/krds.css 의 .pub-foot 규칙으로 공용화(양 레이아웃 동일 적용). -->
<footer th:fragment="footer" class="pub-foot">
    <div class="pub-wrap">
        <!-- 전자정부표준프레임워크 공식 홈페이지 배너 -->
        <a href="https://www.egovframe.go.kr/home/main.do" target="_blank" rel="noopener"
           class="egov-official-banner" th:title="#{footer.official.title}">
            <span class="ban-txt">
                <strong><i class="bi bi-hexagon-fill"></i> <span th:text="#{footer.official.title}">전자정부표준프레임워크 공식 홈페이지</span></strong>
                <small th:text="#{footer.official.desc}">가이드·다운로드·커뮤니티 — egovframe.go.kr</small>
            </span>
            <span class="ban-go"><span th:text="#{footer.official.go}">바로가기</span> <i class="bi bi-box-arrow-up-right"></i></span>
        </a>
        <div class="pub-foot-top">
            <div>
                <a th:href="@{/}" class="pub-brand"><img class="mark" th:src="@{/images/logo.svg}" alt="eGovFrame"/><span>eGovFrame</span></a>
                <p class="desc" th:text="#{landing.footer.desc}">전자정부표준프레임워크 경량환경 — 대한민국 전자정부의 표준이 되는 오픈소스 소프트웨어 플랫폼입니다.</p>
            </div>
            <div class="pub-foot-cols">
                <div class="pub-foot-col">
                    <h4 th:text="#{landing.footer.col1}">바로가기</h4>
                    <a href="/#about" th:text="#{landing.nav.about}">소개</a>
                    <a href="/#services" th:text="#{landing.nav.services}">서비스</a>
                    <a href="/#works" th:text="#{landing.nav.works}">주요사업</a>
                </div>
                <div class="pub-foot-col">
                    <h4 th:text="#{landing.footer.col2}">포털</h4>
                    <a th:href="@{/portal}" th:text="#{landing.footer.portal}">포털 대시보드</a>
                    <a th:href="@{/bbs/BBSMSTR_AAAAAAAAAAAA/list}" th:text="#{landing.footer.notice}">공지사항</a>
                    <a th:href="@{/login}" th:text="#{landing.footer.login}">로그인</a>
                </div>
                <div class="pub-foot-col">
                    <h4 th:text="#{landing.footer.col3}">지원</h4>
                    <a href="/#contact" th:text="#{landing.footer.contact}">문의하기</a>
                    <a th:href="@{/krds-sample}" th:text="#{landing.nav.krds}">KRDS 예시</a>
                    <a href="/swagger-ui/index.html" target="_blank" th:text="#{landing.footer.api}">API 문서</a>
                </div>
            </div>
        </div>
        <div class="pub-foot-bottom">
            <span th:text="#{landing.footer.copyright}">© 2026 전자정부표준프레임워크. All rights reserved.</span>
            <span class="soc">
                <a href="https://www.egovframe.go.kr/home/main.do" target="_blank" rel="noopener" th:attr="aria-label=#{footer.official.title},title=#{footer.official.title}" aria-label="전자정부표준프레임워크 공식 홈페이지" title="전자정부표준프레임워크 공식 홈페이지"><i class="bi bi-house"></i></a>
                <a href="https://github.com/gjh999/simple-home-boot" target="_blank" rel="noopener" th:attr="aria-label=#{footer.soc.github},title=#{footer.soc.github}" aria-label="GitHub 저장소" title="GitHub 저장소"><i class="bi bi-github"></i></a>
                <a href="https://www.krds.go.kr" target="_blank" rel="noopener" th:attr="aria-label=#{footer.soc.krds},title=#{footer.soc.krds}" aria-label="KRDS 디지털정부 디자인시스템" title="KRDS 디지털정부 디자인시스템"><i class="bi bi-globe"></i></a>
                <a href="https://www.youtube.com/channel/UC_ZpWtFSV_e_Y5iWjPsGbxQ" target="_blank" rel="noopener" th:attr="aria-label=#{footer.soc.youtube},title=#{footer.soc.youtube}" aria-label="전자정부표준프레임워크 유튜브" title="전자정부표준프레임워크 유튜브"><i class="bi bi-youtube"></i></a>
            </span>
        </div>
    </div>
</footer>
</body>
</html>
