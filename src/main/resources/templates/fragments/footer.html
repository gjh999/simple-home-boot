<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<body>
<footer th:fragment="footer" class="egov-footer bg-dark text-white py-4 mt-5">
    <div class="container-fluid px-4">
        <!-- 전자정부표준프레임워크 공식 홈페이지 배너 -->
        <a href="https://www.egovframe.go.kr/home/main.do" target="_blank" rel="noopener"
           class="egov-official-banner" th:title="#{footer.official.title}">
            <span class="ban-txt">
                <strong><i class="bi bi-hexagon-fill"></i> <span th:text="#{footer.official.title}">전자정부표준프레임워크 공식 홈페이지</span></strong>
                <small th:text="#{footer.official.desc}">가이드·다운로드·커뮤니티 — egovframe.go.kr</small>
            </span>
            <span class="ban-go"><span th:text="#{footer.official.go}">바로가기</span> <i class="bi bi-box-arrow-up-right"></i></span>
        </a>
        <!-- 바로가기 링크 -->
        <div class="d-flex flex-wrap gap-3 mb-3" style="font-size:.85rem;">
            <a th:href="@{/}" class="text-white text-decoration-none" th:text="#{nav.home}">홈</a>
            <a th:href="@{/portal}" class="text-white text-decoration-none" th:text="#{nav.portal}">포털</a>
            <a th:href="@{/bbs/BBSMSTR_AAAAAAAAAAAA/list}" class="text-white text-decoration-none" th:text="#{nav.notice}">공지사항</a>
            <a href="/swagger-ui/index.html" target="_blank" class="text-white text-decoration-none" th:text="#{landing.footer.api}">API 문서</a>
        </div>
        <div class="row">
            <div class="col-md-6">
                <h6 class="fw-bold" th:text="#{footer.title}">전자정부표준프레임워크</h6>
                <p class="text-muted small mb-0" th:text="#{footer.dept}">행정안전부 | eGovFrame 5.0</p>
            </div>
            <div class="col-md-6 text-md-end">
                <p class="text-muted small mb-0">
                    Copyright &copy; <span th:text="${#temporals.year(#temporals.createNow())}">2026</span>
                    <span th:text="#{footer.copyright}">Ministry of the Interior and Safety. All rights reserved.</span>
                </p>
            </div>
        </div>
    </div>
</footer>
</body>
</html>
