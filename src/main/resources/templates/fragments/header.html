<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ko">
<body>
<header th:fragment="header" class="egov-header bg-white border-bottom shadow-sm">
    <div class="container-fluid d-flex align-items-center justify-content-between py-2 px-4">

        <!-- 로고 영역 -->
        <div class="egov-header-logo">
            <a th:href="@{/}" class="text-decoration-none d-flex align-items-center">
                <img th:src="@{/images/logo.svg}" alt="전자정부표준프레임워크" height="40"/>
                <span class="ms-2 fw-bold text-primary fs-5">eGovFrame</span>
            </a>
        </div>

        <!-- 사용자 메뉴 -->
        <div class="egov-header-user d-flex align-items-center gap-2">
            <!-- 언어 선택 -->
            <div class="egov-lang" role="group" aria-label="언어 선택">
                <a th:href="@{/cmm/lang(lang='ko')}" class="lang-btn" th:classappend="${#locale.language == 'ko'} ? 'active'">한국어</a>
                <a th:href="@{/cmm/lang(lang='en')}" class="lang-btn" th:classappend="${#locale.language == 'en'} ? 'active'">EN</a>
            </div>
            <!-- 관리자 → 회원관리 / 일반 사용자 → 마이페이지 -->
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/member/list}" class="btn btn-outline-primary btn-sm" title="회원관리">
                <i class="bi bi-person-gear me-1"></i>
                <strong sec:authentication="principal.name">관리자</strong> 님
            </a>
            <a sec:authorize="!hasRole('ADMIN')" th:href="@{/mypage}" class="btn btn-outline-primary btn-sm" title="마이페이지">
                <i class="bi bi-person-circle me-1"></i>
                <strong sec:authentication="principal.name">사용자</strong> 님
            </a>
            <a th:href="@{/logout}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-box-arrow-right me-1"></i><span th:text="#{header.logout}">로그아웃</span>
            </a>
        </div>
    </div>
</header>
</body>
</html>
