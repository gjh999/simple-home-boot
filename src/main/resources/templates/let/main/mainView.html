<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}"
      lang="ko">
<head>
    <title>홈</title>
</head>
<body>
<main layout:fragment="content">

    <!-- 페이지 타이틀 -->
    <div class="page-title-bar">
        <div class="container-fluid px-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{dash.breadcrumb.home}">홈</a></li>
                    <li class="breadcrumb-item active" th:text="#{dash.breadcrumb.portal}">포털</li>
                </ol>
            </nav>
            <h1 th:text="#{dash.title}">포털 대시보드</h1>
        </div>
    </div>

    <div class="container-fluid px-4">

        <!-- 환영 배너 (KRDS 히어로) -->
        <div class="card egov-hero mb-4 border-0">
            <div class="card-body py-5 px-4">
                <div class="d-flex align-items-center">
                    <div>
                        <span class="egov-hero-badge"><i class="bi bi-stars me-1"></i>eGovFrame 5.0</span>
                        <h2 class="egov-hero-title fw-bold">
                            <span th:text="#{dash.welcome}">전자정부표준프레임워크에 오신 것을 환영합니다</span>
                            <th:block sec:authorize="isAuthenticated()">
                                <span class="fs-5 fw-normal ms-2">
                                    — <span sec:authentication="principal.name">사용자</span>
                                </span>
                            </th:block>
                        </h2>
                        <p class="mb-0 egov-hero-sub" th:text="#{dash.welcome.sub}">eGovFrame 5.0 + Spring Boot + Thymeleaf</p>
                    </div>
                    <div class="ms-auto d-none d-md-block">
                        <div class="egov-hero-icon"><i class="bi bi-house-door"></i></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">

            <!-- 공지사항 -->
            <div class="col-lg-6">
                <div class="card h-100">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-megaphone me-2 text-primary"></i><span th:text="#{dash.notice}">공지사항</span></span>
                        <a th:href="@{/bbs/BBSMSTR_AAAAAAAAAAAA/list}" class="btn btn-sm btn-outline-primary" th:text="#{dash.more}">더보기</a>
                    </div>
                    <div class="card-body p-0">
                        <table class="egov-table mb-0" th:if="${notiList != null and !#lists.isEmpty(notiList)}">
                            <thead>
                            <tr>
                                <th style="width:50px" th:text="#{dash.col.no}">번호</th>
                                <th th:text="#{dash.col.title}">제목</th>
                                <th style="width:100px" th:text="#{dash.col.date}">등록일</th>
                                <th style="width:60px" th:text="#{dash.col.views}">조회</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="item, stat : ${notiList}">
                                <td class="text-center" th:text="${stat.count}">1</td>
                                <td>
                                    <a th:href="@{/bbs/BBSMSTR_AAAAAAAAAAAA/{nttId}/detail(nttId=${item.nttId})}"
                                       class="text-decoration-none text-dark"
                                       th:text="${item.nttSj}">제목</a>
                                </td>
                                <td class="text-center text-muted small"
                                    th:text="${item.frstRegisterPnttm != null ? #strings.substring(item.frstRegisterPnttm, 0, 10) : ''}">2026-01-01</td>
                                <td class="text-center text-muted small" th:text="${item.inqireCo}">0</td>
                            </tr>
                            </tbody>
                        </table>
                        <div th:if="${notiList == null or #lists.isEmpty(notiList)}"
                             class="text-center text-muted py-4">
                            <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                            <span th:text="#{dash.empty.notice}">등록된 공지사항이 없습니다.</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 갤러리/자유게시판 -->
            <div class="col-lg-6">
                <div class="card h-100">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-images me-2 text-success"></i><span th:text="#{dash.freeboard}">자유게시판</span></span>
                        <a th:href="@{/bbs/BBSMSTR_BBBBBBBBBBBB/list}" class="btn btn-sm btn-outline-success" th:text="#{dash.more}">더보기</a>
                    </div>
                    <div class="card-body p-0">
                        <table class="egov-table mb-0" th:if="${galList != null and !#lists.isEmpty(galList)}">
                            <thead>
                            <tr>
                                <th style="width:50px" th:text="#{dash.col.no}">번호</th>
                                <th th:text="#{dash.col.title}">제목</th>
                                <th style="width:100px" th:text="#{dash.col.date}">등록일</th>
                                <th style="width:60px" th:text="#{dash.col.views}">조회</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="item, stat : ${galList}">
                                <td class="text-center" th:text="${stat.count}">1</td>
                                <td>
                                    <a th:href="@{/bbs/BBSMSTR_BBBBBBBBBBBB/{nttId}/detail(nttId=${item.nttId})}"
                                       class="text-decoration-none text-dark"
                                       th:text="${item.nttSj}">제목</a>
                                </td>
                                <td class="text-center text-muted small"
                                    th:text="${item.frstRegisterPnttm != null ? #strings.substring(item.frstRegisterPnttm, 0, 10) : ''}">2026-01-01</td>
                                <td class="text-center text-muted small" th:text="${item.inqireCo}">0</td>
                            </tr>
                            </tbody>
                        </table>
                        <div th:if="${galList == null or #lists.isEmpty(galList)}"
                             class="text-center text-muted py-4">
                            <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                            <span th:text="#{dash.empty.board}">등록된 게시글이 없습니다.</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 빠른 메뉴 -->
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-grid-3x3-gap me-2 text-primary"></i><span th:text="#{dash.quicklinks}">바로가기</span>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-6 col-md-3">
                                <a th:href="@{/bbs/BBSMSTR_AAAAAAAAAAAA/list}"
                                   class="btn btn-outline-primary w-100 d-flex flex-column align-items-center py-3">
                                    <i class="bi bi-megaphone fs-3 mb-2"></i>
                                    <span class="small fw-semibold" th:text="#{dash.ql.notice}">공지사항</span>
                                </a>
                            </div>
                            <div class="col-6 col-md-3">
                                <a th:href="@{/schedule}"
                                   class="btn btn-outline-success w-100 d-flex flex-column align-items-center py-3">
                                    <i class="bi bi-calendar3 fs-3 mb-2"></i>
                                    <span class="small fw-semibold" th:text="#{dash.ql.schedule}">일정관리</span>
                                </a>
                            </div>
                            <div class="col-6 col-md-3">
                                <th:block sec:authorize="hasRole('ADMIN')">
                                    <a th:href="@{/member/list}"
                                       class="btn btn-outline-info w-100 d-flex flex-column align-items-center py-3">
                                        <i class="bi bi-person-gear fs-3 mb-2"></i>
                                        <span class="small fw-semibold" th:text="#{dash.ql.member}">회원관리</span>
                                    </a>
                                </th:block>
                                <th:block sec:authorize="isAuthenticated() and !hasRole('ADMIN')">
                                    <a th:href="@{/mypage}"
                                       class="btn btn-outline-info w-100 d-flex flex-column align-items-center py-3">
                                        <i class="bi bi-person-circle fs-3 mb-2"></i>
                                        <span class="small fw-semibold" th:text="#{dash.ql.mypage}">마이페이지</span>
                                    </a>
                                </th:block>
                                <th:block sec:authorize="isAnonymous()">
                                    <a th:href="@{/login}"
                                       class="btn btn-outline-info w-100 d-flex flex-column align-items-center py-3">
                                        <span class="small fw-semibold" th:text="#{dash.ql.login}">로그인</span>
                                    </a>
                                </th:block>
                            </div>
                            <div class="col-6 col-md-3">
                                <a href="/swagger-ui/index.html" target="_blank"
                                   class="btn btn-outline-warning w-100 d-flex flex-column align-items-center py-3">
                                    <i class="bi bi-code-slash fs-3 mb-2"></i>
                                    <span class="small fw-semibold" th:text="#{dash.ql.apidoc}">API 문서</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

</main>
</body>
</html>
