<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/login}"
      lang="ko">
<head>
    <title th:text="#{register.title}">회원가입</title>
</head>
<body>
<main layout:fragment="content">

    <div class="login-card">

        <!-- 로고 -->
        <div class="login-logo">
            <img class="logo-badge" th:src="@{/images/logo.svg}" alt="eGovFrame"/>
            <h1 class="mt-3" th:text="#{register.title}">회원가입</h1>
            <p class="text-muted small" th:text="#{register.subtitle}">eGovFrame 5.0 · 새 계정 만들기</p>
        </div>

        <!-- 오류 메시지 -->
        <div th:if="${errorMsg}" class="alert alert-danger d-flex align-items-center gap-2" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span th:text="${errorMsg}">오류</span>
        </div>

        <!-- 회원가입 폼 -->
        <form th:action="@{/register}" method="post" id="registerForm" novalidate>

            <div class="mb-3">
                <label for="mberId" class="form-label fw-semibold" th:text="#{register.id}">아이디</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="bi bi-person text-primary"></i></span>
                    <input type="text" id="mberId" name="mberId" class="krds-input"
                           th:value="${mberId}" th:placeholder="#{register.id.ph}" placeholder="아이디 (4자 이상)" required
                           autocomplete="username" minlength="4" maxlength="20"/>
                    <div class="invalid-feedback" th:text="#{register.id.ph}">아이디를 입력하세요.</div>
                </div>
            </div>

            <div class="mb-3">
                <label for="mberNm" class="form-label fw-semibold" th:text="#{register.name}">이름</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="bi bi-card-text text-primary"></i></span>
                    <input type="text" id="mberNm" name="mberNm" class="krds-input"
                           th:value="${mberNm}" th:placeholder="#{register.name.ph}" placeholder="이름을 입력하세요" required maxlength="50"/>
                    <div class="invalid-feedback" th:text="#{register.name.ph}">이름을 입력하세요.</div>
                </div>
            </div>

            <div class="mb-3">
                <label for="mberEmailAdres" class="form-label fw-semibold">
                    <span th:text="#{register.email}">이메일</span>
                    <span class="text-muted small" th:text="#{register.email.optional}">(선택)</span>
                </label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="bi bi-envelope text-primary"></i></span>
                    <input type="email" id="mberEmailAdres" name="mberEmailAdres" class="krds-input"
                           th:value="${mberEmailAdres}" th:placeholder="#{register.email.ph}" placeholder="name@example.com" maxlength="50"/>
                </div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label fw-semibold" th:text="#{register.pw}">비밀번호</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="bi bi-lock text-primary"></i></span>
                    <input type="password" id="password" name="password" class="krds-input"
                           th:placeholder="#{register.pw.ph}" placeholder="비밀번호 (4자 이상)" required autocomplete="new-password"
                           minlength="4" maxlength="100"/>
                    <div class="invalid-feedback" th:text="#{register.pw.ph}">비밀번호를 입력하세요.</div>
                </div>
            </div>

            <div class="mb-4">
                <label for="passwordConfirm" class="form-label fw-semibold" th:text="#{register.pwConfirm}">비밀번호 확인</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="bi bi-lock-fill text-primary"></i></span>
                    <input type="password" id="passwordConfirm" name="passwordConfirm" class="krds-input"
                           th:placeholder="#{register.pwConfirm.ph}" placeholder="비밀번호를 다시 입력하세요" required autocomplete="new-password"
                           maxlength="100"/>
                    <div class="invalid-feedback" id="pwMismatch" th:text="#{register.pwMismatch}">비밀번호가 일치하지 않습니다.</div>
                </div>
            </div>

            <button type="submit" class="krds-btn primary w-100 py-2 fw-semibold fs-6">
                <i class="bi bi-person-plus"></i> <span th:text="#{register.submit}">가입하기</span>
            </button>
        </form>

        <p class="login-signup-hint text-center mt-3 mb-0">
            <span th:text="#{register.haveAccount}">이미 계정이 있으신가요?</span>
            <a th:href="@{/login}" class="login-signup-link" th:text="#{register.login}">로그인</a>
        </p>

        <hr class="my-4"/>

        <div class="text-center">
            <a th:href="@{/}" class="login-back">
                <i class="bi bi-arrow-left me-1"></i><span th:text="#{register.home}">홈으로 돌아가기</span>
            </a>
        </div>
    </div>

</main>
<th:block layout:fragment="body-js">
<script>
(function () {
    'use strict';
    var form = document.getElementById('registerForm');
    var pw = document.getElementById('password');
    var pwc = document.getElementById('passwordConfirm');

    function checkMatch() {
        if (pwc.value && pw.value !== pwc.value) {
            pwc.setCustomValidity('mismatch');
        } else {
            pwc.setCustomValidity('');
        }
    }
    pw.addEventListener('input', checkMatch);
    pwc.addEventListener('input', checkMatch);

    form.addEventListener('submit', function (e) {
        checkMatch();
        if (!form.checkValidity()) {
            e.preventDefault();
            e.stopPropagation();
        }
        form.classList.add('was-validated');
    });
})();
</script>
</th:block>
</body>
</html>
