<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}"
      lang="ko">
<head><title>회원 수정</title></head>
<body>
<main layout:fragment="content">
    <div class="page-title-bar">
        <div class="container-fluid px-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/member/list}">회원관리</a></li>
                    <li class="breadcrumb-item active">수정</li>
                </ol>
            </nav>
            <h2>회원 정보 수정</h2>
        </div>
    </div>

    <div class="container-fluid px-4">
        <div class="krds-panel">
            <div class="krds-panel-body">
                <form th:action="@{/member/{id}/update(id=${member?.mberId})}" method="post"
                      id="updateMemberForm">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="form-group">
                                <div class="form-tit"><label for="mberNm">이름 <span class="frm-rq">*</span></label></div>
                                <div class="form-conts">
                                    <input type="text" id="mberNm" name="mberNm" class="krds-input"
                                           th:value="${member?.mberNm}" required maxlength="50"/>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <div class="form-tit"><label for="mberEmailAdres">이메일</label></div>
                                <div class="form-conts">
                                    <input type="email" id="mberEmailAdres" name="mberEmailAdres" class="krds-input"
                                           th:value="${member?.mberEmailAdres}" maxlength="50"/>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <div class="form-tit"><label for="moblphonNo">휴대폰</label></div>
                                <div class="form-conts">
                                    <input type="text" id="moblphonNo" name="moblphonNo" class="krds-input"
                                           th:value="${member?.moblphonNo}" maxlength="20"/>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <div class="form-tit"><label for="zip">우편번호</label></div>
                                <div class="form-conts">
                                    <input type="text" id="zip" name="zip" class="krds-input"
                                           th:value="${member?.zip}" maxlength="6"/>
                                </div>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="form-group">
                                <div class="form-tit"><label for="adres">주소</label></div>
                                <div class="form-conts">
                                    <input type="text" id="adres" name="adres" class="krds-input"
                                           th:value="${member?.adres}" maxlength="100"/>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a th:href="@{/member/{id}/detail(id=${member?.mberId})}" class="krds-btn tertiary">
                            <i class="bi bi-x-circle"></i> 취소
                        </a>
                        <button type="submit" class="krds-btn primary">
                            <i class="bi bi-save"></i> 저장
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
