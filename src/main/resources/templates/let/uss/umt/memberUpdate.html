<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}"
      lang="ko">
<head><title>회원 수정</title></head>
<body>
<main layout:fragment="content">
    <div class="page-title-bar">
        <div class="container-fluid px-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/member/list}">회원관리</a></li>
                    <li class="breadcrumb-item active">수정</li>
                </ol>
            </nav>
            <h2>회원 정보 수정</h2>
        </div>
    </div>

    <div class="container-fluid px-4">
        <div class="card">
            <div class="card-body">
                <form th:action="@{/member/{id}/update(id=${member?.mberId})}" method="post"
                      id="updateMemberForm" novalidate>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="mberNm" class="form-label fw-semibold">이름 <span class="text-danger">*</span></label>
                            <input type="text" id="mberNm" name="mberNm" class="form-control"
                                   th:value="${member?.mberNm}" required maxlength="50"/>
                        </div>
                        <div class="col-md-6">
                            <label for="mberEmailAdres" class="form-label fw-semibold">이메일</label>
                            <input type="email" id="mberEmailAdres" name="mberEmailAdres" class="form-control"
                                   th:value="${member?.mberEmailAdres}" maxlength="50"/>
                        </div>
                        <div class="col-md-6">
                            <label for="moblphonNo" class="form-label fw-semibold">휴대폰</label>
                            <input type="text" id="moblphonNo" name="moblphonNo" class="form-control"
                                   th:value="${member?.moblphonNo}" maxlength="20"/>
                        </div>
                        <div class="col-md-6">
                            <label for="zip" class="form-label fw-semibold">우편번호</label>
                            <input type="text" id="zip" name="zip" class="form-control"
                                   th:value="${member?.zip}" maxlength="6"/>
                        </div>
                        <div class="col-12">
                            <label for="adres" class="form-label fw-semibold">주소</label>
                            <input type="text" id="adres" name="adres" class="form-control"
                                   th:value="${member?.adres}" maxlength="100"/>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a th:href="@{/member/{id}/detail(id=${member?.mberId})}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-circle me-1"></i>취소
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-1"></i>저장
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
