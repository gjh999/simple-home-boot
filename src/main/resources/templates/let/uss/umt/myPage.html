<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}"
      lang="ko">
<head>
    <title>마이페이지</title>
</head>
<body>
<main layout:fragment="content">

    <!-- 페이지 타이틀 -->
    <div class="page-title-bar">
        <div class="container-fluid px-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
                    <li class="breadcrumb-item active">마이페이지</li>
                </ol>
            </nav>
            <h1><i class="bi bi-person-circle me-2"></i>마이페이지</h1>
        </div>
    </div>

    <div class="container-fluid px-4">

        <!-- 플래시 메시지 -->
        <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row g-4">

            <!-- 회원정보 수정 -->
            <div class="col-lg-7">
                <div class="card h-100">
                    <div class="card-header">
                        <i class="bi bi-person-vcard me-2 text-primary"></i>회원정보
                    </div>
                    <div class="card-body">
                        <form th:action="@{/mypage/info}" method="post" id="infoForm" novalidate>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">아이디</label>
                                <input type="text" class="form-control" th:value="${mber?.mberId}" disabled readonly/>
                                <div class="form-text">아이디는 변경할 수 없습니다.</div>
                            </div>

                            <div class="mb-3">
                                <label for="mberNm" class="form-label fw-semibold">이름 <span class="text-danger">*</span></label>
                                <input type="text" id="mberNm" name="mberNm" class="form-control"
                                       th:value="${mber?.mberNm}" required maxlength="50"/>
                                <div class="invalid-feedback">이름을 입력하세요.</div>
                            </div>

                            <div class="mb-3">
                                <label for="mberEmailAdres" class="form-label fw-semibold">이메일</label>
                                <input type="email" id="mberEmailAdres" name="mberEmailAdres" class="form-control"
                                       th:value="${mber?.mberEmailAdres}" placeholder="name@example.com" maxlength="50"/>
                            </div>

                            <div class="mb-3">
                                <label for="moblphonNo" class="form-label fw-semibold">휴대전화</label>
                                <input type="text" id="moblphonNo" name="moblphonNo" class="form-control"
                                       th:value="${mber?.moblphonNo}" placeholder="010-0000-0000" maxlength="20"/>
                            </div>

                            <div class="row g-2 mb-3">
                                <div class="col-sm-4">
                                    <label for="zip" class="form-label fw-semibold">우편번호</label>
                                    <input type="text" id="zip" name="zip" class="form-control"
                                           th:value="${mber?.zip}" maxlength="6"/>
                                </div>
                                <div class="col-sm-8">
                                    <label for="adres" class="form-label fw-semibold">주소</label>
                                    <input type="text" id="adres" name="adres" class="form-control"
                                           th:value="${mber?.adres}" maxlength="100"/>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="detailAdres" class="form-label fw-semibold">상세주소</label>
                                <input type="text" id="detailAdres" name="detailAdres" class="form-control"
                                       th:value="${mber?.detailAdres}" maxlength="100"/>
                            </div>

                            <div class="text-end">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-save me-1"></i>정보 저장
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- 비밀번호 변경 -->
            <div class="col-lg-5">
                <div class="card h-100">
                    <div class="card-header">
                        <i class="bi bi-shield-lock me-2 text-info"></i>비밀번호 변경
                    </div>
                    <div class="card-body">
                        <div th:if="${pwSuccessMsg}" class="alert alert-success" role="alert">
                            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${pwSuccessMsg}"></span>
                        </div>
                        <div th:if="${pwErrorMsg}" class="alert alert-danger" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${pwErrorMsg}"></span>
                        </div>

                        <form th:action="@{/mypage/password}" method="post" id="pwForm" novalidate>
                            <div class="mb-3">
                                <label for="oldPassword" class="form-label fw-semibold">현재 비밀번호 <span class="text-danger">*</span></label>
                                <input type="password" id="oldPassword" name="oldPassword" class="form-control"
                                       required autocomplete="current-password" maxlength="100"/>
                                <div class="invalid-feedback">현재 비밀번호를 입력하세요.</div>
                            </div>
                            <div class="mb-3">
                                <label for="newPassword" class="form-label fw-semibold">새 비밀번호 <span class="text-danger">*</span></label>
                                <input type="password" id="newPassword" name="newPassword" class="form-control"
                                       required autocomplete="new-password" minlength="4" maxlength="100"
                                       placeholder="4자 이상"/>
                                <div class="invalid-feedback">새 비밀번호를 입력하세요.</div>
                            </div>
                            <div class="mb-4">
                                <label for="confirmPassword" class="form-label fw-semibold">새 비밀번호 확인 <span class="text-danger">*</span></label>
                                <input type="password" id="confirmPassword" name="confirmPassword" class="form-control"
                                       required autocomplete="new-password" maxlength="100"/>
                                <div class="invalid-feedback" id="pwMismatch">비밀번호가 일치하지 않습니다.</div>
                            </div>
                            <div class="text-end">
                                <button type="submit" class="btn btn-info">
                                    <i class="bi bi-key me-1"></i>비밀번호 변경
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>

</main>
<th:block layout:fragment="body-js">
<script>
(function () {
    'use strict';
    var infoForm = document.getElementById('infoForm');
    infoForm.addEventListener('submit', function (e) {
        if (!infoForm.checkValidity()) { e.preventDefault(); e.stopPropagation(); }
        infoForm.classList.add('was-validated');
    });

    var pwForm = document.getElementById('pwForm');
    var np = document.getElementById('newPassword');
    var cp = document.getElementById('confirmPassword');
    function checkMatch() {
        cp.setCustomValidity(cp.value && np.value !== cp.value ? 'mismatch' : '');
    }
    np.addEventListener('input', checkMatch);
    cp.addEventListener('input', checkMatch);
    pwForm.addEventListener('submit', function (e) {
        checkMatch();
        if (!pwForm.checkValidity()) { e.preventDefault(); e.stopPropagation(); }
        pwForm.classList.add('was-validated');
    });
})();
</script>
</th:block>
</body>
</html>
