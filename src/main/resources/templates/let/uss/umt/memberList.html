<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}"
      lang="ko">
<head><title th:text="#{mber.list.title}">회원관리</title></head>
<body>
<main layout:fragment="content">

    <!-- 페이지 타이틀 + KRDS 브레드크럼 -->
    <div class="page-title-bar">
        <div class="container-fluid px-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{nav.home}">홈</a></li>
                    <li class="breadcrumb-item active" th:text="#{mber.list.title}">회원관리</li>
                </ol>
            </nav>
            <h2 th:text="#{mber.list.title}">회원관리</h2>
        </div>
    </div>

    <div class="container-fluid px-4">

        <!-- 플래시 메시지 -->
        <div th:if="${successMsg}" class="alert alert-success auto-dismiss" role="alert">
            <span th:text="${successMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" th:attr="title=#{com.btn.close}"></button>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger" role="alert">
            <span th:text="${errorMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" th:attr="title=#{com.btn.close}"></button>
        </div>

        <!-- 검색 영역 (KRDS 폼) -->
        <form th:action="@{/member/list}" method="get" class="search-bar krds-search">
            <div class="row g-2 align-items-end">
                <div class="col-md-3">
                    <div class="form-group">
                        <div class="form-tit"><label for="searchCondition" th:text="#{com.label.searchCnd}">검색구분</label></div>
                        <div class="form-conts">
                            <select id="searchCondition" name="searchCondition" class="krds-form-select" th:attr="title=#{com.label.searchCndSelect}" title="검색구분 선택">
                                <option value="0" th:selected="${searchVO.searchCondition == '0'}" th:text="#{mber.search.id}">아이디</option>
                                <option value="1" th:selected="${searchVO.searchCondition == '1'}" th:text="#{mber.search.nm}">이름</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <div class="form-tit"><label for="searchKeyword" th:text="#{com.label.keyword}">검색어</label></div>
                        <div class="form-conts">
                            <input type="text" id="searchKeyword" name="searchKeyword" class="krds-input"
                                   th:value="${searchVO.searchKeyword}" th:placeholder="#{com.ph.keyword}" placeholder="검색어를 입력하세요" maxlength="50"/>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="krds-btn primary medium w-100">
                        <i class="bi bi-search"></i> <span th:text="#{com.btn.search}">검색</span>
                    </button>
                </div>
            </div>
        </form>

        <!-- 목록 헤더: 전체 건수 -->
        <div class="d-flex justify-content-between align-items-center mb-2 mt-3">
            <span class="text-muted"><span th:text="#{com.total.pre}">전체</span> <strong th:text="${paginationInfo?.totalRecordCount} ?: 0">0</strong><span th:text="#{com.total.post}">건</span></span>
        </div>

        <!-- 회원 목록 (KRDS 표) -->
        <div class="krds-table-wrap">
            <table class="tbl">
                <caption th:text="#{mber.list.caption}">회원 목록 — 번호·아이디·이름·이메일·상태·가입일·관리</caption>
                <colgroup>
                    <col style="width:60px"><col style="width:120px"><col><col style="width:170px"><col style="width:90px"><col style="width:110px"><col style="width:90px">
                </colgroup>
                <thead>
                <tr>
                    <th scope="col" th:text="#{com.col.no}">번호</th>
                    <th scope="col" th:text="#{mber.field.id}">아이디</th>
                    <th scope="col" th:text="#{mber.field.nm}">이름</th>
                    <th scope="col" th:text="#{mber.field.email}">이메일</th>
                    <th scope="col" th:text="#{mber.col.status}">상태</th>
                    <th scope="col" th:text="#{mber.col.regDate}">가입일</th>
                    <th scope="col" th:text="#{com.col.manage}">관리</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="member, stat : ${memberList}" th:if="${memberList != null and !#lists.isEmpty(memberList)}">
                    <td class="text-center" th:text="${stat.count}">1</td>
                    <td class="text-center" th:text="${member.mberId}">id</td>
                    <td style="text-align:left">
                        <a th:href="@{/member/{id}/detail(id=${member.mberId})}" class="txt"
                           th:text="${member.mberNm}">이름</a>
                    </td>
                    <td style="text-align:left" th:text="${member.mberEmailAdres}">email</td>
                    <td class="text-center">
                        <span class="krds-badge"
                              th:classappend="${member.mberSttus == '정상'} ? 'bg-success' : 'bg-gray'"
                              th:text="${member.mberSttus}">상태</span>
                    </td>
                    <td class="text-center"
                        th:text="${member.sbscrbDe != null ? #strings.substring(member.sbscrbDe, 0, 10) : ''}">2026-01-01</td>
                    <td class="text-center">
                        <a th:href="@{/member/{id}/update(id=${member.mberId})}"
                           class="krds-btn tertiary xsmall" th:text="#{com.btn.edit}">수정</a>
                    </td>
                </tr>
                <tr th:if="${memberList == null or #lists.isEmpty(memberList)}">
                    <td colspan="7" class="text-center py-4 text-muted">
                        <i class="bi bi-people fs-3 d-block mb-2"></i><span th:text="#{mber.list.empty}">등록된 회원이 없습니다.</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- 페이지네이션 -->
        <div th:replace="~{fragments/pagination :: pagination(paginationInfo=${paginationInfo}, baseUrl='/member/list', searchCnd='', searchWrd='')}"></div>

    </div>
</main>
</body>
</html>
