<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}"
      lang="ko">
<head>
    <title th:text="#{bbsmst.write.title}">게시판 등록</title>
</head>
<body>
<main layout:fragment="content">

    <div class="page-title-bar">
        <div class="container-fluid px-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{nav.home}">홈</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/bbs/master/list}" th:text="#{bbsmst.crumb.manage}">게시판 관리</a></li>
                    <li class="breadcrumb-item active" th:text="#{bbsmst.crumb.write}">등록</li>
                </ol>
            </nav>
            <h2 th:text="#{bbsmst.write.title}">게시판 마스터 등록</h2>
        </div>
    </div>

    <div class="container-fluid px-4">
        <div class="krds-panel">
            <div class="krds-panel-body">
                <form th:action="@{/bbs/master/write}" method="post">

                    <div class="fieldset">
                        <div class="mb-3 row form-group">
                            <div class="col-sm-3 form-tit"><label for="bbsNm"><span th:text="#{bbsmst.field.bbsNm}">게시판명</span> <span class="frm-rq">*</span></label></div>
                            <div class="col-sm-9 form-conts">
                                <input type="text" id="bbsNm" name="bbsNm" class="krds-input"
                                       th:placeholder="#{bbsmst.write.ph.bbsNm}" placeholder="게시판명을 입력하세요" maxlength="255" required/>
                            </div>
                        </div>

                        <div class="mb-3 row form-group">
                            <div class="col-sm-3 form-tit"><label for="bbsIntrcn" th:text="#{bbsmst.field.bbsIntrcn}">게시판 소개</label></div>
                            <div class="col-sm-9 form-conts">
                                <textarea id="bbsIntrcn" name="bbsIntrcn" class="krds-input" rows="3"
                                          th:placeholder="#{bbsmst.write.ph.bbsIntrcn}" placeholder="게시판 소개를 입력하세요" maxlength="2400"></textarea>
                            </div>
                        </div>

                        <div class="mb-3 row form-group">
                            <div class="col-sm-3 form-tit"><label for="bbsTyCode"><span th:text="#{bbsmst.field.bbsTy}">게시판 유형</span> <span class="frm-rq">*</span></label></div>
                            <div class="col-sm-9 form-conts">
                                <select id="bbsTyCode" name="bbsTyCode" class="krds-form-select" required>
                                    <option value="" th:text="#{com.select}">-- 선택 --</option>
                                    <option th:each="type : ${typeList}"
                                            th:value="${type.code}"
                                            th:text="${type.codeNm}">유형</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3 row form-group">
                            <div class="col-sm-3 form-tit"><label for="bbsAttrbCode"><span th:text="#{bbsmst.field.bbsAttrb}">게시판 속성</span> <span class="frm-rq">*</span></label></div>
                            <div class="col-sm-9 form-conts">
                                <select id="bbsAttrbCode" name="bbsAttrbCode" class="krds-form-select" required>
                                    <option value="" th:text="#{com.select}">-- 선택 --</option>
                                    <option th:each="attr : ${attrbList}"
                                            th:value="${attr.code}"
                                            th:text="${attr.codeNm}">속성</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3 row form-group">
                            <div class="col-sm-3 form-tit"><label th:text="#{bbsmst.field.fileAllow}">첨부파일 허용</label></div>
                            <div class="col-sm-9 pt-2 form-conts">
                                <div class="form-check form-check-inline">
                                    <input type="radio" id="fileAtchY" name="fileAtchPosblAt" value="Y" class="form-check-input" checked/>
                                    <label for="fileAtchY" class="form-check-label" th:text="#{com.allow.y}">허용</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input type="radio" id="fileAtchN" name="fileAtchPosblAt" value="N" class="form-check-input"/>
                                    <label for="fileAtchN" class="form-check-label" th:text="#{com.allow.n}">불가</label>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3 row form-group">
                            <div class="col-sm-3 form-tit"><label for="posblAtchFileNumber" th:text="#{bbsmst.field.maxFile}">최대 첨부파일 수</label></div>
                            <div class="col-sm-3 form-conts">
                                <input type="number" id="posblAtchFileNumber" name="posblAtchFileNumber"
                                       class="krds-input" value="2" min="0" max="10"/>
                            </div>
                        </div>

                        <div class="mb-3 row form-group">
                            <div class="col-sm-3 form-tit"><label th:text="#{bbsmst.field.replyAllow}">답글 허용</label></div>
                            <div class="col-sm-9 pt-2 form-conts">
                                <div class="form-check form-check-inline">
                                    <input type="radio" id="replyY" name="replyPosblAt" value="Y" class="form-check-input" checked/>
                                    <label for="replyY" class="form-check-label" th:text="#{com.allow.y}">허용</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input type="radio" id="replyN" name="replyPosblAt" value="N" class="form-check-input"/>
                                    <label for="replyN" class="form-check-label" th:text="#{com.allow.n}">불가</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a th:href="@{/bbs/master/list}" class="krds-btn tertiary">
                            <i class="bi bi-x-circle"></i> <span th:text="#{com.btn.cancel}">취소</span>
                        </a>
                        <button type="submit" class="krds-btn primary">
                            <i class="bi bi-save"></i> <span th:text="#{com.btn.save}">저장</span>
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
