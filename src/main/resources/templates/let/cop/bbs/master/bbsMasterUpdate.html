<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}"
      lang="ko">
<head>
    <title>게시판 수정</title>
</head>
<body>
<main layout:fragment="content">

    <div class="page-title-bar">
        <div class="container-fluid px-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/bbs/master/list}">게시판 관리</a></li>
                    <li class="breadcrumb-item active">수정</li>
                </ol>
            </nav>
            <h2>게시판 마스터 수정</h2>
        </div>
    </div>

    <div class="container-fluid px-4">
        <div class="card">
            <div class="card-body">
                <form th:action="@{/bbs/master/{id}/update(id=${bbsId})}" method="post">

                    <div class="mb-3 row">
                        <label class="col-sm-3 col-form-label fw-semibold">게시판 ID</label>
                        <div class="col-sm-9">
                            <input type="text" class="form-control" th:value="${bbsId}" readonly/>
                        </div>
                    </div>

                    <div class="mb-3 row">
                        <label for="bbsNm" class="col-sm-3 col-form-label fw-semibold">게시판명 <span class="text-danger">*</span></label>
                        <div class="col-sm-9">
                            <input type="text" id="bbsNm" name="bbsNm" class="form-control"
                                   th:value="${detail?.bbsNm}" maxlength="255" required/>
                        </div>
                    </div>

                    <div class="mb-3 row">
                        <label for="bbsIntrcn" class="col-sm-3 col-form-label fw-semibold">게시판 소개</label>
                        <div class="col-sm-9">
                            <textarea id="bbsIntrcn" name="bbsIntrcn" class="form-control" rows="3"
                                      maxlength="2400" th:text="${detail?.bbsIntrcn}"></textarea>
                        </div>
                    </div>

                    <div class="mb-3 row">
                        <label for="bbsTyCode" class="col-sm-3 col-form-label fw-semibold">게시판 유형</label>
                        <div class="col-sm-9">
                            <select id="bbsTyCode" name="bbsTyCode" class="form-select">
                                <option value="">-- 선택 --</option>
                                <option th:each="type : ${typeList}"
                                        th:value="${type.code}"
                                        th:text="${type.codeNm}"
                                        th:selected="${type.code == detail?.bbsTyCode}">유형</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3 row">
                        <label for="bbsAttrbCode" class="col-sm-3 col-form-label fw-semibold">게시판 속성</label>
                        <div class="col-sm-9">
                            <select id="bbsAttrbCode" name="bbsAttrbCode" class="form-select">
                                <option value="">-- 선택 --</option>
                                <option th:each="attr : ${attrbList}"
                                        th:value="${attr.code}"
                                        th:text="${attr.codeNm}"
                                        th:selected="${attr.code == detail?.bbsAttrbCode}">속성</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3 row">
                        <label class="col-sm-3 col-form-label fw-semibold">첨부파일 허용</label>
                        <div class="col-sm-9 pt-2">
                            <div class="form-check form-check-inline">
                                <input type="radio" id="fileAtchY" name="fileAtchPosblAt" value="Y" class="form-check-input"
                                       th:checked="${detail?.fileAtchPosblAt == 'Y'}"/>
                                <label for="fileAtchY" class="form-check-label">허용</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input type="radio" id="fileAtchN" name="fileAtchPosblAt" value="N" class="form-check-input"
                                       th:checked="${detail?.fileAtchPosblAt != 'Y'}"/>
                                <label for="fileAtchN" class="form-check-label">불가</label>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3 row">
                        <label for="posblAtchFileNumber" class="col-sm-3 col-form-label fw-semibold">최대 첨부파일 수</label>
                        <div class="col-sm-3">
                            <input type="number" id="posblAtchFileNumber" name="posblAtchFileNumber"
                                   class="form-control" th:value="${detail?.posblAtchFileNumber}" min="0" max="10"/>
                        </div>
                    </div>

                    <div class="mb-3 row">
                        <label class="col-sm-3 col-form-label fw-semibold">답글 허용</label>
                        <div class="col-sm-9 pt-2">
                            <div class="form-check form-check-inline">
                                <input type="radio" id="replyY" name="replyPosblAt" value="Y" class="form-check-input"
                                       th:checked="${detail?.replyPosblAt == 'Y'}"/>
                                <label for="replyY" class="form-check-label">허용</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input type="radio" id="replyN" name="replyPosblAt" value="N" class="form-check-input"
                                       th:checked="${detail?.replyPosblAt != 'Y'}"/>
                                <label for="replyN" class="form-check-label">불가</label>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3 row">
                        <label class="col-sm-3 col-form-label fw-semibold">사용여부</label>
                        <div class="col-sm-9 pt-2">
                            <div class="form-check form-check-inline">
                                <input type="radio" id="useAtY" name="useAt" value="Y" class="form-check-input"
                                       th:checked="${detail?.useAt == 'Y'}"/>
                                <label for="useAtY" class="form-check-label">사용</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input type="radio" id="useAtN" name="useAt" value="N" class="form-check-input"
                                       th:checked="${detail?.useAt != 'Y'}"/>
                                <label for="useAtN" class="form-check-label">미사용</label>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a th:href="@{/bbs/master/{id}/detail(id=${bbsId})}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-1"></i>취소
                        </a>
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-save me-1"></i>수정
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
