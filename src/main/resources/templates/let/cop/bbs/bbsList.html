<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}"
      lang="ko">
<head>
    <title th:text="${result?.brdMstrVO?.bbsNm} ?: '게시판'">게시판</title>
</head>
<body>
<main layout:fragment="content">

    <!-- 페이지 타이틀 + KRDS 브레드크럼 -->
    <div class="page-title-bar">
        <div class="container-fluid px-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
                    <li class="breadcrumb-item active" th:text="${result?.brdMstrVO?.bbsNm} ?: '게시판'">게시판</li>
                </ol>
            </nav>
            <h2 th:text="${result?.brdMstrVO?.bbsNm} ?: '게시판'">게시판</h2>
        </div>
    </div>

    <div class="container-fluid px-4">

        <!-- 플래시 메시지 -->
        <div th:if="${successMsg}" class="alert alert-success auto-dismiss" role="alert">
            <span th:text="${successMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" title="닫기"></button>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger" role="alert">
            <span th:text="${errorMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" title="닫기"></button>
        </div>

        <!-- 검색 영역 (KRDS 폼) -->
        <form th:action="@{/bbs/{bbsId}/list(bbsId=${bbsId})}" method="get" class="search-bar krds-search">
            <div class="row g-2 align-items-end">
                <div class="col-md-3">
                    <div class="form-group">
                        <div class="form-tit"><label for="searchCnd">검색구분</label></div>
                        <div class="form-conts">
                            <select id="searchCnd" name="searchCnd" class="krds-form-select" title="검색구분 선택">
                                <option value="0" th:selected="${search.searchCnd == '0'}">제목</option>
                                <option value="1" th:selected="${search.searchCnd == '1'}">내용</option>
                                <option value="2" th:selected="${search.searchCnd == '2'}">작성자</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <div class="form-tit"><label for="searchWrd">검색어</label></div>
                        <div class="form-conts">
                            <input type="text" id="searchWrd" name="searchWrd" class="krds-input"
                                   th:value="${search.searchWrd}" placeholder="검색어를 입력하세요" maxlength="100"/>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="krds-btn primary medium w-100">
                        <i class="bi bi-search"></i> 검색
                    </button>
                </div>
            </div>
        </form>

        <!-- 목록 헤더: 전체 건수 -->
        <div class="d-flex justify-content-between align-items-center mb-2 mt-3">
            <span class="text-muted">전체 <strong th:text="${paginationInfo?.totalRecordCount} ?: 0">0</strong>건</span>
        </div>

        <!-- 게시물 목록 (KRDS 표) -->
        <div class="krds-table-wrap">
            <table class="tbl">
                <caption>게시판 목록 — 번호·제목·작성자·등록일·조회수</caption>
                <colgroup>
                    <col style="width:70px"><col><col style="width:110px"><col style="width:120px"><col style="width:80px">
                </colgroup>
                <thead>
                <tr>
                    <th scope="col">번호</th>
                    <th scope="col">제목</th>
                    <th scope="col">작성자</th>
                    <th scope="col">등록일</th>
                    <th scope="col">조회</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item, stat : ${result?.resultList}"
                    th:if="${result != null and !#lists.isEmpty(result.resultList)}">
                    <td class="text-center"
                        th:text="${paginationInfo.totalRecordCount - (paginationInfo.currentPageNo - 1) * paginationInfo.recordCountPerPage - stat.index}">1</td>
                    <td style="text-align:left">
                        <a th:href="@{/bbs/{bbsId}/{nttId}/detail(bbsId=${bbsId}, nttId=${item.nttId})}" class="txt"
                           th:text="${item.nttSj}">제목</a>
                    </td>
                    <td class="text-center" th:text="${item.frstRegisterNm}">작성자</td>
                    <td class="text-center"
                        th:text="${item.frstRegisterPnttm != null ? #strings.substring(item.frstRegisterPnttm, 0, 10) : ''}">2026-01-01</td>
                    <td class="text-center" th:text="${item.inqireCo}">0</td>
                </tr>
                <tr th:if="${result == null or result.resultList == null or #lists.isEmpty(result.resultList)}">
                    <td colspan="5" class="text-center py-4 text-muted">등록된 게시물이 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- 페이지네이션 -->
        <div th:replace="~{fragments/pagination :: pagination(paginationInfo=${paginationInfo}, baseUrl=${'/bbs/' + bbsId + '/list'}, searchCnd=${search != null ? search.searchCnd : ''}, searchWrd=${search != null ? search.searchWrd : ''})}"></div>

        <!-- 하단 버튼 -->
        <div class="d-flex justify-content-end mt-3">
            <th:block sec:authorize="isAuthenticated()">
                <a th:href="@{/bbs/{bbsId}/write(bbsId=${bbsId})}" class="krds-btn primary">
                    <i class="bi bi-pencil-square"></i> 글쓰기
                </a>
            </th:block>
        </div>

    </div>
</main>
</body>
</html>
