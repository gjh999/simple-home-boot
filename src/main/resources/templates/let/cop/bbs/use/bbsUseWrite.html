<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}"
      lang="ko">
<head>
    <title>게시판 사용정보 등록</title>
</head>
<body>
<main layout:fragment="content">

    <div class="page-title-bar">
        <div class="container-fluid px-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/bbs/use/list}">게시판 사용정보</a></li>
                    <li class="breadcrumb-item active">등록</li>
                </ol>
            </nav>
            <h2>게시판 사용정보 등록</h2>
        </div>
    </div>

    <div class="container-fluid px-4">
        <div class="card">
            <div class="card-body">
                <form th:action="@{/bbs/use/write}" method="post">

                    <div class="mb-3 row">
                        <label for="bbsId" class="col-sm-3 col-form-label fw-semibold">게시판 선택 <span class="text-danger">*</span></label>
                        <div class="col-sm-9">
                            <select id="bbsId" name="bbsId" class="form-select" required>
                                <option value="">-- 게시판을 선택하세요 --</option>
                                <option th:each="bbs : ${notUsedList}"
                                        th:value="${bbs.bbsId}"
                                        th:text="${bbs.bbsNm}">게시판명</option>
                            </select>
                            <div class="form-text text-muted">미사용 게시판 마스터 목록입니다. 사용하려면 게시판 관리에서 먼저 등록하세요.</div>
                        </div>
                    </div>

                    <div class="mb-3 row">
                        <label for="trgetId" class="col-sm-3 col-form-label fw-semibold">대상시스템 ID <span class="text-danger">*</span></label>
                        <div class="col-sm-9">
                            <input type="text" id="trgetId" name="trgetId" class="form-control"
                                   value="SYSTEM_DEFAULT_BOARD" maxlength="20" required/>
                        </div>
                    </div>

                    <div class="mb-3 row">
                        <label class="col-sm-3 col-form-label fw-semibold">사용여부</label>
                        <div class="col-sm-9 pt-2">
                            <div class="form-check form-check-inline">
                                <input type="radio" id="useAtY" name="useAt" value="Y" class="form-check-input" checked/>
                                <label for="useAtY" class="form-check-label">사용</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input type="radio" id="useAtN" name="useAt" value="N" class="form-check-input"/>
                                <label for="useAtN" class="form-check-label">미사용</label>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a th:href="@{/bbs/use/list}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-circle me-1"></i>취소
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-1"></i>저장
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
