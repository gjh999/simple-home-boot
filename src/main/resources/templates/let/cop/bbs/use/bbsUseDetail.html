<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}"
      lang="ko">
<head>
    <title th:text="#{bbsuse.detail.title}">게시판 사용정보 상세</title>
</head>
<body>
<main layout:fragment="content">

    <div class="page-title-bar">
        <div class="container-fluid px-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{nav.home}">홈</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/bbs/use/list}" th:text="#{bbsuse.crumb}">게시판 사용정보</a></li>
                    <li class="breadcrumb-item active" th:text="#{bbsmst.crumb.detail}">상세</li>
                </ol>
            </nav>
            <h2 th:text="#{bbsuse.detail.title}">게시판 사용정보 상세</h2>
        </div>
    </div>

    <div class="container-fluid px-4">

        <div th:if="${successMsg}" class="alert alert-success" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" th:attr="title=#{com.btn.close}" title="닫기"></button>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" th:attr="title=#{com.btn.close}" title="닫기"></button>
        </div>

        <div class="krds-panel">
            <div class="krds-panel-body">
                <div class="krds-table-wrap">
                    <table class="tbl col">
                        <caption th:text="#{bbsuse.detail.caption}">게시판 사용정보 상세</caption>
                        <colgroup>
                            <col style="width:30%"/>
                            <col style="width:70%"/>
                        </colgroup>
                        <tbody>
                        <tr>
                            <th scope="row" th:text="#{bbsmst.field.bbsId}">게시판 ID</th>
                            <td th:text="${bdUseVO?.bbsId}"></td>
                        </tr>
                        <tr>
                            <th scope="row" th:text="#{bbsmst.field.bbsNm}">게시판명</th>
                            <td>
                                <span th:text="${bdUseVO?.bbsNm}"></span>
                                <a th:if="${bdUseVO?.provdUrl != null and !#strings.isEmpty(bdUseVO.provdUrl)}"
                                   th:href="${bdUseVO.provdUrl}" class="krds-btn secondary small ms-3">
                                    <i class="bi bi-box-arrow-up-right"></i> <span th:text="#{bbsuse.goBoard}">게시판 이동</span>
                                </a>
                            </td>
                        </tr>
                        <tr>
                            <th scope="row"><span th:text="#{bbsuse.col.trgetId}">대상시스템 ID</span><i class="bi bi-info-circle" tabindex="0" th:title="#{bbsuse.tip.trgetId}" title="대상 시스템 식별자"></i></th>
                            <td th:text="${bdUseVO?.trgetId}"></td>
                        </tr>
                        <tr>
                            <th scope="row" th:text="#{bbsuse.col.regSe}">등록구분</th>
                            <td th:text="${bdUseVO?.registSeCodeNm}"></td>
                        </tr>
                        <tr>
                            <th scope="row" th:text="#{bbsmst.field.useAt}">사용여부</th>
                            <td>
                                <span th:if="${bdUseVO?.useAt == 'Y'}" class="krds-badge bg-success" th:text="#{com.use.y}">사용</span>
                                <span th:unless="${bdUseVO?.useAt == 'Y'}" class="krds-badge bg-gray" th:text="#{com.use.n}">미사용</span>
                            </td>
                        </tr>
                        <tr>
                            <th scope="row" th:text="#{bbsuse.field.regstr}">등록자</th>
                            <td th:text="${bdUseVO?.frstRegisterNm}"></td>
                        </tr>
                        <tr>
                            <th scope="row" th:text="#{com.col.date}">등록일</th>
                            <td th:text="${bdUseVO?.frstRegisterPnttm != null ? #strings.substring(bdUseVO.frstRegisterPnttm, 0, 10) : '-'}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 사용여부 수정 폼 -->
        <div class="krds-panel mt-3">
            <div class="krds-panel-head fw-semibold" th:text="#{bbsuse.changeUse}">사용여부 변경</div>
            <div class="krds-panel-body">
                <form th:action="@{/bbs/use/{trgetId}/{bbsId}/update(trgetId=${trgetId}, bbsId=${bbsId})}" method="post">
                    <div class="row align-items-center">
                        <div class="col-auto">
                            <div class="form-check form-check-inline">
                                <input type="radio" id="useAtY" name="useAt" value="Y" class="form-check-input"
                                       th:checked="${bdUseVO?.useAt == 'Y'}"/>
                                <label for="useAtY" class="form-check-label" th:text="#{com.use.y}">사용</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input type="radio" id="useAtN" name="useAt" value="N" class="form-check-input"
                                       th:checked="${bdUseVO?.useAt != 'Y'}"/>
                                <label for="useAtN" class="form-check-label" th:text="#{com.use.n}">미사용</label>
                            </div>
                        </div>
                        <div class="col-auto">
                            <button type="submit" class="krds-btn primary small" th:text="#{com.btn.changeSave}">변경 저장</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="d-flex justify-content-start mt-3">
            <a th:href="@{/bbs/use/list}" class="krds-btn tertiary">
                <i class="bi bi-arrow-left"></i> <span th:text="#{com.btn.list}">목록</span>
            </a>
        </div>

    </div>
</main>
</body>
</html>
