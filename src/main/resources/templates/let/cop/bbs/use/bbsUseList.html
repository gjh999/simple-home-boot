<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}"
      lang="ko">
<head>
    <title>게시판 사용정보 관리</title>
</head>
<body>
<main layout:fragment="content">

    <div class="page-title-bar">
        <div class="container-fluid px-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
                    <li class="breadcrumb-item">관리자</li>
                    <li class="breadcrumb-item active">게시판 사용정보</li>
                </ol>
            </nav>
            <h2>게시판 사용정보 관리</h2>
        </div>
    </div>

    <div class="container-fluid px-4">

        <div th:if="${successMsg}" class="alert alert-success" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" title="닫기"></button>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" title="닫기"></button>
        </div>

        <!-- 검색 -->
        <form th:action="@{/bbs/use/list}" method="get" class="search-bar krds-search">
            <div class="row g-2 align-items-end">
                <div class="col-md-4">
                    <div class="form-group">
                        <div class="form-tit"><label for="searchWrd">검색어</label></div>
                        <div class="form-conts">
                            <input type="text" id="searchWrd" name="searchWrd" class="krds-input"
                                   th:value="${search?.searchWrd}" placeholder="게시판명 검색" maxlength="100"/>
                        </div>
                    </div>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="krds-btn primary small w-100">
                        <i class="bi bi-search"></i> 검색
                    </button>
                </div>
                <div class="col-md-6 text-end">
                    <span class="text-muted small">
                        전체 <strong th:text="${resultCnt} ?: 0">0</strong>건
                    </span>
                </div>
            </div>
        </form>

        <!-- 목록 -->
        <div class="krds-table-wrap">
            <table class="tbl">
                <caption>게시판 사용정보 목록 — 번호·게시판명·대상시스템 ID·등록구분·사용여부·등록일</caption>
                <colgroup>
                    <col style="width:60px"><col><col style="width:140px"><col style="width:100px"><col style="width:80px"><col style="width:110px">
                </colgroup>
                <thead>
                <tr>
                    <th scope="col">번호</th>
                    <th scope="col">게시판명</th>
                    <th scope="col">대상시스템 ID</th>
                    <th scope="col">등록구분</th>
                    <th scope="col">사용여부</th>
                    <th scope="col">등록일</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item, stat : ${resultList}"
                    th:if="${resultList != null and !#lists.isEmpty(resultList)}">
                    <td class="text-center text-muted small"
                        th:text="${paginationInfo.totalRecordCount - (paginationInfo.currentPageNo - 1) * paginationInfo.recordCountPerPage - stat.index}">1</td>
                    <td style="text-align:left">
                        <a th:href="@{/bbs/use/{trgetId}/{bbsId}/detail(trgetId=${item.trgetId}, bbsId=${item.bbsId})}"
                           class="txt" th:text="${item.bbsNm}">게시판명</a>
                    </td>
                    <td class="text-center small" th:text="${item.trgetId}"></td>
                    <td class="text-center small" th:text="${item.registSeCodeNm}"></td>
                    <td class="text-center small">
                        <span th:if="${item.useAt == 'Y'}" class="krds-badge bg-success">사용</span>
                        <span th:unless="${item.useAt == 'Y'}" class="krds-badge bg-gray">미사용</span>
                    </td>
                    <td class="text-center small text-muted"
                        th:text="${item.frstRegisterPnttm != null ? #strings.substring(item.frstRegisterPnttm, 0, 10) : ''}"></td>
                </tr>
                <tr th:if="${resultList == null or #lists.isEmpty(resultList)}">
                    <td colspan="6" class="text-center py-4 text-muted">
                        <i class="bi bi-inbox fs-3 d-block mb-2"></i>등록된 사용정보가 없습니다.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- 페이지네이션 -->
        <div th:replace="~{fragments/pagination :: pagination(paginationInfo=${paginationInfo}, baseUrl='/bbs/use/list', searchCnd='', searchWrd=${search != null ? search.searchWrd : ''})}"></div>

        <!-- 하단 버튼 -->
        <div class="d-flex justify-content-end mt-3">
            <a th:href="@{/bbs/use/write}" class="krds-btn primary">
                <i class="bi bi-plus-circle"></i> 사용정보 등록
            </a>
        </div>

    </div>
</main>
</body>
</html>
