<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}"
      lang="ko">
<head><title th:text="#{bbs.write.title}">게시물 등록</title></head>
<body>
<main layout:fragment="content">

    <div class="page-title-bar">
        <div class="container-fluid px-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{nav.home}">홈</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/bbs/{bbsId}/list(bbsId=${bbsId})}" th:text="#{bbs.board}">게시판</a></li>
                    <li class="breadcrumb-item active" th:text="#{bbs.write.crumb}">게시물 등록</li>
                </ol>
            </nav>
            <h2 th:text="#{bbs.write.title}">게시물 등록</h2>
        </div>
    </div>

    <div class="container-fluid px-4">

        <!-- 등록 실패 시 사유 표시 (예: 허용되지 않는 파일 확장자) -->
        <div th:if="${errorMsg}" class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" th:attr="title=#{com.btn.close}" title="닫기"></button>
        </div>

        <div class="krds-panel">
            <div class="krds-panel-body">
                <form th:action="@{/bbs/{bbsId}/write(bbsId=${bbsId})}" method="post"
                      id="writeForm" enctype="multipart/form-data">

                    <div class="fieldset">
                        <div class="form-group">
                            <div class="form-tit"><label for="nttSj"><span th:text="#{bbs.write.field.title}">제목</span> <span class="frm-rq">*</span></label></div>
                            <div class="form-conts">
                                <input type="text" id="nttSj" name="nttSj" class="krds-input"
                                       th:value="${board.nttSj}"
                                       th:placeholder="#{bbs.write.ph.title}" placeholder="제목을 입력하세요" required maxlength="2000"/>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="form-tit"><label for="nttCn"><span th:text="#{bbs.write.field.content}">내용</span> <span class="frm-rq">*</span></label></div>
                            <div class="form-conts">
                                <textarea id="nttCn" name="nttCn" class="krds-input"
                                          rows="15" th:placeholder="#{bbs.write.ph.content}" placeholder="내용을 입력하세요" required
                                          th:text="${board.nttCn}"></textarea>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="form-tit"><label for="file_1"><i class="bi bi-paperclip me-1"></i><span th:text="#{bbs.write.attach}">첨부파일</span></label></div>
                            <div class="form-conts">
                                <input type="file" id="file_1" name="file_1" class="krds-input"
                                       accept=".gif,.jpg,.jpeg,.png,.xls,.xlsx,.pdf,.doc,.docx,.ppt,.pptx,.hwp,.hwpx,.txt,.zip"/>
                                <input type="file" id="file_2" name="file_2" class="krds-input mt-2"
                                       accept=".gif,.jpg,.jpeg,.png,.xls,.xlsx,.pdf,.doc,.docx,.ppt,.pptx,.hwp,.hwpx,.txt,.zip"/>
                                <input type="file" id="file_3" name="file_3" class="krds-input mt-2"
                                       accept=".gif,.jpg,.jpeg,.png,.xls,.xlsx,.pdf,.doc,.docx,.ppt,.pptx,.hwp,.hwpx,.txt,.zip"/>
                            </div>
                            <p class="form-hint">
                                <span th:text="#{bbs.write.attach.hint}">최대 3개, 파일당 10MB 이하.</span>
                                <span th:text="#{bbs.write.attach.exts}">허용 확장자: gif, jpg, jpeg, png, xls, xlsx, pdf, doc, docx, ppt, pptx, hwp, hwpx, txt, zip</span>
                            </p>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mt-3">
                        <a th:href="@{/bbs/{bbsId}/list(bbsId=${bbsId})}" class="krds-btn tertiary">
                            <i class="bi bi-x-circle"></i> <span th:text="#{com.btn.cancel}">취소</span>
                        </a>
                        <button type="submit" class="krds-btn primary">
                            <i class="bi bi-save"></i> <span th:text="#{com.btn.register}">등록</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</main>
<th:block layout:fragment="body-js">
<script>
(function () {
    'use strict';
    var form = document.getElementById('writeForm');
    form.addEventListener('submit', function (e) {
        if (!form.checkValidity()) {
            e.preventDefault();
            e.stopPropagation();
        }
        form.classList.add('was-validated');
    });
})();
</script>
</th:block>
</body>
</html>
