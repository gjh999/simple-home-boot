<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}"
      lang="ko">
<head><title>게시물 수정</title></head>
<body>
<main layout:fragment="content">

    <div class="page-title-bar">
        <div class="container-fluid px-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/bbs/{bbsId}/list(bbsId=${bbsId})}">게시판</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/bbs/{bbsId}/{nttId}/detail(bbsId=${bbsId},nttId=${nttId})}">상세보기</a></li>
                    <li class="breadcrumb-item active">수정</li>
                </ol>
            </nav>
            <h2>게시물 수정</h2>
        </div>
    </div>

    <div class="container-fluid px-4">
        <div class="card">
            <div class="card-body">
                <form th:action="@{/bbs/{bbsId}/{nttId}/update(bbsId=${bbsId}, nttId=${nttId})}"
                      method="post" id="updateForm" enctype="multipart/form-data" novalidate>

                    <!-- 기존 첨부파일 그룹 ID (이어붙이기용) -->
                    <input type="hidden" name="atchFileId" th:value="${result?.boardVO?.atchFileId}"/>

                    <div class="mb-3">
                        <label for="nttSj" class="form-label fw-semibold">제목 <span class="text-danger">*</span></label>
                        <input type="text" id="nttSj" name="nttSj" class="form-control"
                               th:value="${result?.boardVO?.nttSj}" required maxlength="2000"/>
                        <div class="invalid-feedback">제목을 입력하세요.</div>
                    </div>

                    <div class="mb-3">
                        <label for="nttCn" class="form-label fw-semibold">내용 <span class="text-danger">*</span></label>
                        <textarea id="nttCn" name="nttCn" class="form-control"
                                  rows="15" required
                                  th:text="${result?.boardVO?.nttCn}"></textarea>
                        <div class="invalid-feedback">내용을 입력하세요.</div>
                    </div>

                    <!-- 기존 첨부파일 목록 -->
                    <div class="mb-2" th:if="${result?.resultFiles != null and !#lists.isEmpty(result.resultFiles)}">
                        <label class="form-label fw-semibold"><i class="bi bi-paperclip me-1"></i>기존 첨부파일</label>
                        <ul class="list-unstyled mb-0">
                            <li th:each="f : ${result.resultFiles}" class="small">
                                <i class="bi bi-file-earmark me-1"></i>
                                <a th:href="@{/file(atchFileId=${f.atchFileId}, fileSn=${f.fileSn})}"
                                   th:text="${f.orignlFileNm}">파일명</a>
                            </li>
                        </ul>
                    </div>

                    <div class="mb-3">
                        <label for="file_1" class="form-label fw-semibold">
                            <i class="bi bi-paperclip me-1"></i>첨부파일 추가
                        </label>
                        <input type="file" id="file_1" name="file_1" class="form-control"/>
                        <input type="file" id="file_2" name="file_2" class="form-control mt-2"/>
                        <div class="form-text">선택한 파일은 기존 첨부에 추가됩니다. (파일당 10MB 이하)</div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a th:href="@{/bbs/{bbsId}/{nttId}/detail(bbsId=${bbsId}, nttId=${nttId})}"
                           class="btn btn-outline-secondary">
                            <i class="bi bi-x-circle me-1"></i>취소
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-1"></i>저장
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</main>
<th:block layout:fragment="body-js">
<script>
(function () {
    'use strict';
    var form = document.getElementById('updateForm');
    form.addEventListener('submit', function (e) {
        if (!form.checkValidity()) {
            e.preventDefault();
            e.stopPropagation();
        }
        form.classList.add('was-validated');
    });
})();
</script>
</th:block>
</body>
</html>
