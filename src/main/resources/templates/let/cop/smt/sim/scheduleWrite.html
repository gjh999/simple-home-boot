<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}"
      lang="ko">
<head><title th:text="#{sch.write.title}">일정 등록</title></head>
<body>
<main layout:fragment="content">
    <div class="page-title-bar">
        <div class="container-fluid px-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{nav.home}">홈</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/schedule}" th:text="#{sch.list.title}">일정관리</a></li>
                    <li class="breadcrumb-item active" th:text="#{sch.crumb.write}">일정 등록</li>
                </ol>
            </nav>
            <h2 th:text="#{sch.write.title}">일정 등록</h2>
        </div>
    </div>
    <div class="container-fluid px-4">
        <div class="krds-panel">
            <div class="krds-panel-body">
                <form th:action="@{/schedule/write}" method="post" id="scheduleWriteForm">
                    <div class="row g-3">
                        <div class="col-12">
                            <div class="form-group">
                                <div class="form-tit"><label for="schdulNm"><span th:text="#{sch.field.nm}">일정명</span> <span class="frm-rq">*</span></label></div>
                                <div class="form-conts">
                                    <input type="text" id="schdulNm" name="schdulNm" class="krds-input" required maxlength="255"/>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <div class="form-tit"><label for="schdulBgnde"><span th:text="#{sch.field.bgn}">시작일시</span> <span class="frm-rq">*</span></label></div>
                                <div class="form-conts">
                                    <input type="datetime-local" id="schdulBgnde" name="schdulBgnde"
                                           class="krds-input" required/>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <div class="form-tit"><label for="schdulEndde"><span th:text="#{sch.field.end}">종료일시</span> <span class="frm-rq">*</span></label></div>
                                <div class="form-conts">
                                    <input type="datetime-local" id="schdulEndde" name="schdulEndde"
                                           class="krds-input" required/>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <div class="form-tit"><label for="schdulPlace" th:text="#{sch.field.place}">장소</label></div>
                                <div class="form-conts">
                                    <input type="text" id="schdulPlace" name="schdulPlace" class="krds-input" maxlength="255"/>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <div class="form-tit"><label for="schdulIpcrCode" th:text="#{sch.field.ipcr}">중요도</label></div>
                                <div class="form-conts">
                                    <select id="schdulIpcrCode" name="schdulIpcrCode" class="krds-form-select">
                                        <option value="3" th:text="#{sch.ipcr.low}">낮음</option>
                                        <option value="2" selected th:text="#{sch.ipcr.mid}">보통</option>
                                        <option value="1" th:text="#{sch.ipcr.high}">높음</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="form-group">
                                <div class="form-tit"><label for="schdulCn" th:text="#{sch.field.cn}">내용</label></div>
                                <div class="form-conts">
                                    <textarea id="schdulCn" name="schdulCn" class="krds-input" rows="5" maxlength="2500"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between mt-4">
                        <a th:href="@{/schedule}" class="krds-btn tertiary">
                            <i class="bi bi-x-circle"></i> <span th:text="#{com.btn.cancel}">취소</span>
                        </a>
                        <button type="submit" class="krds-btn primary">
                            <i class="bi bi-save"></i> <span th:text="#{com.btn.register}">등록</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
