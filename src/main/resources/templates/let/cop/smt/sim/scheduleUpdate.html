<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}"
      lang="ko">
<head><title>일정 수정</title></head>
<body>
<main layout:fragment="content">
    <div class="page-title-bar">
        <div class="container-fluid px-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/schedule}">일정관리</a></li>
                    <li class="breadcrumb-item active">수정</li>
                </ol>
            </nav>
            <h2>일정 수정</h2>
        </div>
    </div>
    <div class="container-fluid px-4">
        <div class="card">
            <div class="card-body">
                <form th:action="@{/schedule/{id}/update(id=${schedule?.schdulId})}" method="post"
                      id="scheduleUpdateForm" novalidate>
                    <div class="row g-3">
                        <div class="col-12">
                            <label for="schdulNm" class="form-label fw-semibold">일정명 <span class="text-danger">*</span></label>
                            <input type="text" id="schdulNm" name="schdulNm" class="form-control"
                                   th:value="${schedule?.schdulNm}" required maxlength="255"/>
                        </div>
                        <div class="col-md-6">
                            <label for="schdulBgnde" class="form-label fw-semibold">시작일시</label>
                            <input type="datetime-local" id="schdulBgnde" name="schdulBgnde"
                                   class="form-control" th:value="${schedule?.schdulBgnde}"/>
                        </div>
                        <div class="col-md-6">
                            <label for="schdulEndde" class="form-label fw-semibold">종료일시</label>
                            <input type="datetime-local" id="schdulEndde" name="schdulEndde"
                                   class="form-control" th:value="${schedule?.schdulEndde}"/>
                        </div>
                        <div class="col-md-6">
                            <label for="schdulPlace" class="form-label fw-semibold">장소</label>
                            <input type="text" id="schdulPlace" name="schdulPlace" class="form-control"
                                   th:value="${schedule?.schdulPlace}" maxlength="255"/>
                        </div>
                        <div class="col-md-6">
                            <label for="schdulIpcrCode" class="form-label fw-semibold">중요도</label>
                            <select id="schdulIpcrCode" name="schdulIpcrCode" class="form-select">
                                <option value="3" th:selected="${schedule?.schdulIpcrCode == '3'}">낮음</option>
                                <option value="2" th:selected="${schedule?.schdulIpcrCode == '2'}">보통</option>
                                <option value="1" th:selected="${schedule?.schdulIpcrCode == '1'}">높음</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label for="schdulCn" class="form-label fw-semibold">내용</label>
                            <textarea id="schdulCn" name="schdulCn" class="form-control" rows="5"
                                      th:text="${schedule?.schdulCn}"></textarea>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between mt-4">
                        <a th:href="@{/schedule/{id}/detail(id=${schedule?.schdulId})}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-circle me-1"></i>취소
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-1"></i>저장
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
