<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}"
      lang="ko">
<head>
    <title>관리자 비밀번호 변경</title>
</head>
<body>
<main layout:fragment="content">

    <div class="page-title-bar">
        <div class="container-fluid px-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
                    <li class="breadcrumb-item">관리자</li>
                    <li class="breadcrumb-item active">비밀번호 변경</li>
                </ol>
            </nav>
            <h2>관리자 비밀번호 변경</h2>
        </div>
    </div>

    <div class="container-fluid px-4">

        <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-shield-lock me-2"></i>비밀번호 변경
                    </div>
                    <div class="card-body">
                        <form th:action="@{/admin/password}" method="post" id="passwordForm">

                            <div class="mb-3">
                                <label for="oldPassword" class="form-label fw-semibold">현재 비밀번호 <span class="text-danger">*</span></label>
                                <input type="password" id="oldPassword" name="oldPassword" class="form-control"
                                       placeholder="현재 비밀번호를 입력하세요" required autocomplete="current-password"/>
                            </div>

                            <div class="mb-3">
                                <label for="newPassword" class="form-label fw-semibold">새 비밀번호 <span class="text-danger">*</span></label>
                                <input type="password" id="newPassword" name="newPassword" class="form-control"
                                       placeholder="새 비밀번호를 입력하세요 (8자 이상)" required minlength="8"
                                       autocomplete="new-password"/>
                            </div>

                            <div class="mb-4">
                                <label for="confirmPassword" class="form-label fw-semibold">새 비밀번호 확인 <span class="text-danger">*</span></label>
                                <input type="password" id="confirmPassword" name="confirmPassword" class="form-control"
                                       placeholder="새 비밀번호를 다시 입력하세요" required minlength="8"
                                       autocomplete="new-password"/>
                                <div id="confirmFeedback" class="invalid-feedback">비밀번호가 일치하지 않습니다.</div>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-shield-check me-1"></i>비밀번호 변경
                                </button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</main>
<th:block layout:fragment="body-js">
<script>
document.getElementById('passwordForm').addEventListener('submit', function(e) {
    var np = document.getElementById('newPassword').value;
    var cp = document.getElementById('confirmPassword').value;
    if (np !== cp) {
        e.preventDefault();
        document.getElementById('confirmPassword').classList.add('is-invalid');
        document.getElementById('confirmFeedback').style.display = 'block';
    }
});
document.getElementById('confirmPassword').addEventListener('input', function() {
    this.classList.remove('is-invalid');
});
</script>
</th:block>
</body>
</html>
