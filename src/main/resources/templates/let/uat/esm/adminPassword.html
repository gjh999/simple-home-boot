<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}"
      lang="ko">
<head>
    <title th:text="#{adminpw.title}">관리자 비밀번호 변경</title>
</head>
<body>
<main layout:fragment="content">

    <div class="page-title-bar">
        <div class="container-fluid px-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{nav.home}">홈</a></li>
                    <li class="breadcrumb-item" th:text="#{com.breadcrumb.admin}">관리자</li>
                    <li class="breadcrumb-item active" th:text="#{adminpw.crumb}">비밀번호 변경</li>
                </ol>
            </nav>
            <h2 th:text="#{adminpw.title}">관리자 비밀번호 변경</h2>
        </div>
    </div>

    <div class="container-fluid px-4">

        <div th:if="${successMsg}" class="alert alert-success" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" th:attr="title=#{com.btn.close}"></button>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" th:attr="title=#{com.btn.close}"></button>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="krds-panel">
                    <div class="krds-panel-head">
                        <i class="bi bi-shield-lock me-2"></i><span th:text="#{adminpw.section}">비밀번호 변경</span>
                    </div>
                    <div class="krds-panel-body">
                        <form th:action="@{/admin/password}" method="post" id="passwordForm">

                            <div class="fieldset">
                                <div class="form-group">
                                    <div class="form-tit"><label for="oldPassword"><span th:text="#{adminpw.cur}">현재 비밀번호</span> <span class="frm-rq">*</span></label></div>
                                    <div class="form-conts">
                                        <input type="password" id="oldPassword" name="oldPassword" class="krds-input"
                                               th:placeholder="#{adminpw.ph.cur}" placeholder="현재 비밀번호를 입력하세요" required autocomplete="current-password"/>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <div class="form-tit"><label for="newPassword"><span th:text="#{adminpw.new}">새 비밀번호</span> <span class="frm-rq">*</span></label></div>
                                    <div class="form-conts">
                                        <input type="password" id="newPassword" name="newPassword" class="krds-input"
                                               th:placeholder="#{adminpw.ph.new}" placeholder="새 비밀번호를 입력하세요 (8자 이상)" required minlength="8"
                                               autocomplete="new-password"/>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <div class="form-tit"><label for="confirmPassword"><span th:text="#{adminpw.confirm}">새 비밀번호 확인</span> <span class="frm-rq">*</span></label></div>
                                    <div class="form-conts">
                                        <input type="password" id="confirmPassword" name="confirmPassword" class="krds-input"
                                               th:placeholder="#{adminpw.ph.confirm}" placeholder="새 비밀번호를 다시 입력하세요" required minlength="8"
                                               autocomplete="new-password"/>
                                        <div id="confirmFeedback" class="invalid-feedback" th:text="#{adminpw.mismatch}">비밀번호가 일치하지 않습니다.</div>
                                    </div>
                                </div>
                            </div>

                            <div class="krds-form-actions stack">
                                <button type="submit" class="krds-btn primary">
                                    <i class="bi bi-shield-check"></i> <span th:text="#{adminpw.section}">비밀번호 변경</span>
                                </button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</main>
<th:block layout:fragment="body-js">
<script>
document.getElementById('passwordForm').addEventListener('submit', function(e) {
    var np = document.getElementById('newPassword').value;
    var cp = document.getElementById('confirmPassword').value;
    if (np !== cp) {
        e.preventDefault();
        document.getElementById('confirmPassword').classList.add('is-invalid');
        document.getElementById('confirmFeedback').style.display = 'block';
    }
});
document.getElementById('confirmPassword').addEventListener('input', function() {
    this.classList.remove('is-invalid');
});
</script>
</th:block>
</body>
</html>
