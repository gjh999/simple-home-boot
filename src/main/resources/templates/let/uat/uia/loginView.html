<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/login}"
      lang="ko">
<head>
    <title>로그인</title>
</head>
<body>
<main layout:fragment="content">

    <div class="login-card">

        <!-- 로고 -->
        <div class="login-logo">
            <img class="logo-badge" th:src="@{/images/logo.svg}" alt="eGovFrame"/>
            <h1 class="mt-3" th:text="#{login.brand}">전자정부표준프레임워크</h1>
            <p class="text-muted small">eGovFrame 5.0</p>
        </div>

        <!-- 오류/성공 메시지 -->
        <div th:if="${errorMsg}" class="alert alert-danger d-flex align-items-center gap-2" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span th:text="${errorMsg}">로그인 실패</span>
        </div>
        <div th:if="${logoutMsg}" class="alert alert-success d-flex align-items-center gap-2" role="alert">
            <i class="bi bi-check-circle-fill"></i>
            <span th:text="${logoutMsg}">로그아웃 완료</span>
        </div>
        <div th:if="${param.registered}" class="alert alert-success d-flex align-items-center gap-2" role="alert">
            <i class="bi bi-check-circle-fill"></i>
            <span>회원가입이 완료되었습니다. 가입하신 정보로 로그인해 주세요.</span>
        </div>

        <!-- 로그인 폼 -->
        <form th:action="@{/login}" method="post" id="loginForm" novalidate>

            <div class="mb-3">
                <label for="id" class="form-label fw-semibold" th:text="#{login.id}">아이디</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="bi bi-person text-primary"></i></span>
                    <input type="text" id="id" name="id" class="form-control"
                           th:placeholder="#{login.id.ph}" placeholder="아이디를 입력하세요" required autocomplete="username"
                           maxlength="20"/>
                    <div class="invalid-feedback" th:text="#{login.id.ph}">아이디를 입력하세요.</div>
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label fw-semibold" th:text="#{login.pw}">비밀번호</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="bi bi-lock text-primary"></i></span>
                    <input type="password" id="password" name="password" class="form-control"
                           th:placeholder="#{login.pw.ph}" placeholder="비밀번호를 입력하세요" required autocomplete="current-password"
                           maxlength="100"/>
                    <div class="invalid-feedback" th:text="#{login.pw.ph}">비밀번호를 입력하세요.</div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold fs-6">
                <i class="bi bi-box-arrow-in-right me-1"></i> <span th:text="#{login.submit}">로그인</span>
            </button>
        </form>

        <!-- 회원가입 안내 -->
        <p class="login-signup-hint text-center mt-3 mb-0">
            <span th:text="#{login.signup.hint}">아직 계정이 없으신가요?</span>
            <a th:href="@{/register}" class="login-signup-link" th:text="#{login.signup}">회원가입</a>
        </p>

        <!-- 구분선 -->
        <div class="login-divider"><span th:text="#{login.sns}">또는 SNS 계정으로 로그인</span></div>

        <!-- SNS 로그인 -->
        <div class="sns-login">
            <a th:href="@{/login/naver}" class="sns-btn sns-naver" title="네이버로 로그인">
                <span class="sns-mark">N</span> <span th:text="#{login.naver}">네이버 로그인</span>
            </a>
            <a th:href="@{/login/kakao}" class="sns-btn sns-kakao" title="카카오로 로그인">
                <i class="bi bi-chat-fill"></i> <span th:text="#{login.kakao}">카카오 로그인</span>
            </a>
        </div>

        <hr class="my-4"/>

        <div class="text-center">
            <a th:href="@{/}" class="login-back">
                <i class="bi bi-arrow-left me-1"></i><span th:text="#{login.home}">홈으로 돌아가기</span>
            </a>
        </div>
    </div>

</main>
<th:block layout:fragment="body-js">
<script>
(function () {
    'use strict';
    var form = document.getElementById('loginForm');
    form.addEventListener('submit', function (e) {
        if (!form.checkValidity()) {
            e.preventDefault();
            e.stopPropagation();
        }
        form.classList.add('was-validated');
    });
})();
</script>
</th:block>
</body>
</html>
