# 랜딩 - 소개
landing.about.title=표준화된 개발 환경으로 공공 서비스의 품질을 높입니다
landing.about.sub=전자정부표준프레임워크는 공공부문 정보화 사업 시 적용되는 개발·운영 표준 환경입니다. 특정 업체 기술에 종속되지 않는 개방형 표준을 지향하며, 응용 SW의 표준화와 품질 및 재사용성을 높입니다.
landing.about.li1.t=개방형 표준 준수
landing.about.li1.d=특정 사업자 종속 없이 검증된 오픈소스로 구성
landing.about.li2.t=높은 재사용성
landing.about.li2.d=공통 컴포넌트 재활용으로 개발 생산성 극대화
landing.about.li3.t=검증된 안정성
landing.about.li3.d=다수의 정부 정보화 사업에 적용된 신뢰성
# 랜딩 - 서비스
landing.svc.title=5개 서비스 그룹, 34개 핵심 서비스
landing.svc.sub=실행환경은 화면처리부터 공통기반까지, 애플리케이션 개발에 필요한 모든 영역을 표준 서비스로 제공합니다.
landing.svc.1.t=화면처리
landing.svc.1.d=사용자 인터페이스 구성과 입력값 검증을 담당합니다. MVC, Ajax, 국제화(i18n), 보안 처리를 표준으로 지원합니다.
landing.svc.2.t=업무처리
landing.svc.2.d=업무 로직의 흐름 제어, 트랜잭션 관리, 예외 처리 등 비즈니스 처리의 핵심 기능을 제공합니다.
landing.svc.3.t=데이터처리
landing.svc.3.d=데이터의 영속성 관리와 데이터소스, ORM, 캐시 등 데이터 접근 계층을 표준화하여 제공합니다.
landing.svc.4.t=연계통합
landing.svc.4.d=이기종 시스템 간 연계와 통합 기능을 지원하여 서비스 간 원활한 상호운용성을 보장합니다.
landing.svc.5.t=공통기반
landing.svc.5.d=AOP, IoC, 로깅, 보안, 암호화, 파일처리 등 전 영역에서 공통으로 활용되는 기반 서비스를 제공합니다.
landing.svc.more.t=219+ 공통 컴포넌트
landing.svc.more.d=게시판, 일정, 회원관리 등 즉시 활용 가능한 검증된 공통 컴포넌트로 개발 기간을 단축하세요.
