# ===== KRDS 예시 페이지 =====
krds.page.title=KRDS 사용 예시
krds.intro.h1=KRDS 컴포넌트 사용 예시
krds.intro.p1=디지털정부 표준 디자인시스템(KRDS) <strong>네이티브 클래스(<code>krds-*</code>)</strong>만으로 구성한 참고 페이지입니다. 각 섹션의 마크업을 그대로 복사해 다른 화면을 KRDS로 전환할 때 사용하세요. (탭·아코디언은 <code>krds.min.js</code>가 동작을 담당합니다.)
krds.about.label=KRDS 소개
krds.about.h2=KRDS란 무엇인가요?
krds.about.p1=<strong>KRDS(Korea Design System · 디지털정부 표준 디자인시스템)</strong>는 행정안전부가 만든 <strong>범정부 공식 디자인 시스템</strong>입니다. 대한민국 디지털 정부 서비스(웹·앱)가 일관된 사용자 경험(UI/UX), 높은 <strong>웹접근성</strong>, 사용성을 갖추도록 디자인 원칙·색·타이포그래피·컴포넌트·디자인 토큰을 표준으로 제공합니다.
krds.about.p2=<strong>무엇을 위한 것인가요?</strong> 디자인 요소를 코드화(디자인 토큰)하여 디자이너·개발자 간 소통 비용을 줄이고, 재사용 가능한 HTML 컴포넌트로 공공 서비스를 빠르고 일관되게 구축·운영하기 위함입니다.
krds.about.link.site=KRDS 공식 사이트
