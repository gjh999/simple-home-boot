# ===== KRDS Demo Page =====
krds.page.title=KRDS Usage Examples
krds.intro.h1=KRDS Component Usage Examples
krds.intro.p1=A reference page built solely with the Korea Design System (KRDS) <strong>native classes (<code>krds-*</code>)</strong>. Copy each section's markup as-is when converting other screens to KRDS. (Tabs and accordions are powered by <code>krds.min.js</code>.)
krds.about.label=About KRDS
krds.about.h2=What is KRDS?
krds.about.p1=<strong>KRDS (Korea Design System)</strong> is the <strong>government-wide official design system</strong> created by the Ministry of the Interior and Safety. It provides standard design principles, colors, typography, components, and design tokens so that Korea's digital government services (web and app) offer a consistent user experience (UI/UX), high <strong>web accessibility</strong>, and usability.
krds.about.p2=<strong>What is it for?</strong> By codifying design elements into design tokens, it reduces communication costs between designers and developers and enables public services to be built and operated quickly and consistently with reusable HTML components.
krds.about.link.site=KRDS Official Site
krds.about.link.guide=Component Guide
